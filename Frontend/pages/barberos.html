<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barberos — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Barberos</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar barbero…" aria-label="Search">
        <button class="btn" id="buscar-barbero" type="submit">Buscar</button>
      </form>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Nombre Público</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-barberos">
        <tr>
          <td colspan="5" class="text-center">Cargando...</td>
        </tr>
      </tbody>
    </table>

    <!-- Formulario -->
    <form id="form-barbero" class="row g-2 mt-3">
      <input type="hidden" id="id" />

      <!-- Usuario (solo al crear) -->
      <div class="col-md-4">
        <label for="usuario_id" class="form-label">Usuario</label>
        <select id="usuario_id" class="form-select">
          <option value="">-- Seleccionar usuario --</option>
        </select>
      </div>

      <!-- Nombre público -->
      <div class="col-md-4">
        <label for="nombre_publico" class="form-label">Nombre Público</label>
        <input id="nombre_publico" class="form-control" placeholder="Ej: El Maestro Carlos" />
      </div>

      <!-- Estado -->
      <div class="col-md-2">
        <label for="estado" class="form-label">Estado</label>
        <select id="estado" class="form-select">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="col-12 col-md-auto d-flex align-items-end gap-2">
        <button type="submit" class="btn-form btn-form-save">Guardar</button>
        <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Cancelar</button>
      </div>
    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/Barberos/barberos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
