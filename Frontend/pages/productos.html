<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Productos — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="c">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Productos</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar producto..." aria-label="Search">
        <button class="btn" id="buscar-producto" type="submit">Buscar</button>
      </form>
    </div>

    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Producto</th>
          <th>Categoria</th>
          <th>Costo</th>
          <th>Precio venta</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-productos">
        <tr><td colspan="7" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>

    <form id="form-producto" class="row g-2 mt-3">
      <input type="hidden" id="id" />

      <div class="col-md-4">
        <label for="nombre" class="form-label">Nombre del producto</label>
        <input id="nombre" class="form-control" placeholder="Ej: Gel para cabello" required />
      </div>

      <div class="col-md-3">
        <label for="categoria_id" class="form-label">Categoria</label>
        <select id="categoria_id" class="form-select">
          <option value="">-- Categoria --</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="codigo_barras" class="form-label">Codigo de barras</label>
        <input id="codigo_barras" class="form-control" placeholder="Opcional" />
      </div>

      <div class="col-md-2">
        <label for="costo_ult_compra" class="form-label">Costo compra</label>
        <input id="costo_ult_compra" class="form-control" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>

      <div class="col-md-2">
        <label for="precio_venta" class="form-label">Precio venta</label>
        <input id="precio_venta" class="form-control" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>

      <div class="col-md-2">
        <label for="activo" class="form-label">Estado</label>
        <select id="activo" class="form-select">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>

      <div class="col-12 col-md-auto d-flex align-items-end gap-2">
        <button type="submit" class="btn-form btn-form-save">Guardar</button>
        <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Cancelar</button>
      </div>
    </form>

    <div id="alert-container" class="mt-3"></div>
  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/Inventario/producto.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
