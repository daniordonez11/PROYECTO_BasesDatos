<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sucursales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/css.css" rel="stylesheet">
</head>

<body class="bg-gray">
  <div id="navbar"></div>

  <div class="c">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="mb-4">Gestión de Sucursales</h1>
      <form class="d-flex ms-auto">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" id="buscar-sucursal" type="submit">Search</button>
                </form>
    </div>

    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Dirección</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-sucursales">
        <tr>
          <td colspan="5" class="text-center">Cargando...</td>
        </tr>
      </tbody>
    </table>

    <form id="form-sucursal" class="row g-2 mt-3">
      <input type="hidden" id="id" />
      <div class="col-md-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input id="nombre" class="form-control" placeholder="Nombre" required />
      </div>
      <div class="col-md-4">
        <label for="direccion" class="form-label">Dirección</label>
        <input id="direccion" class="form-control" placeholder="Dirección" required />
      </div>
      <div class="col-md-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input id="telefono" class="form-control" placeholder="Teléfono" required />
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-success me-2">Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-outline-secondary">Cancelar</button>
      </div>
    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>


    <script src="../js/components/navbar_loader.js"></script>
    <script type="module" src="../js/sucursales.js"></script>


    <!-- Bootstrap JS (NECESARIO para que data-bs-dismiss funcione) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
