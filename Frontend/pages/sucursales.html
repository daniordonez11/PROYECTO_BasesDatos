<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sucursales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/css.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"> -->
  <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
  <div id="navbar"></div>

  <main class="container py-4">
    <h1 class="mb-3">Sucursales</h1>

    <!-- Alertas -->
    <div id="alert-container"></div>

    <!-- Filtros / Búsqueda (opcional) -->
    <form id="filter-form" class="row g-2 mb-3">
      <div class="col-sm-4">
        <input type="text" class="form-control" id="q" placeholder="Buscar por nombre o código...">
      </div>
      <div class="col-sm-2">
        <button class="btn btn-primary w-100" type="submit">Buscar</button>
      </div>
    </form>

    <!-- Tabla -->
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-secondary">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-sucursales">
          <tr><td colspan="4" class="text-center py-4">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginación -->
    <nav aria-label="Paginación">
      <ul class="pagination" id="pagination"></ul>
    </nav>

    <hr>

    <!-- Formulario Crear/Editar -->
    <h2 id="form-title">Crear sucursal</h2>
    <form id="form-sucursal" class="row g-3">
      <input type="hidden" id="id" />
      <div class="col-md-4">
        <label for="nombre" class="form-label">Nombre</label>
        <input id="nombre" class="form-control" required />
      </div>
      <div class="col-md-4">
        <label for="ciudad" class="form-label">Ciudad</label>
        <input id="ciudad" class="form-control" required />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="submit" class="btn btn-success me-2">Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-outline-secondary">Cancelar</button>
      </div>
    </form>
  </main>

  <script>
    console.log("MESSI");
  </script>
  <script src="../js/components/navbar_loader.js"></script>
  <script src="../js/http.global.js"></script>

  <!-- Si NO usas módulos ES, ver alternativa más abajo -->
  <script type="module" src="../js/sucursales.js"></script>
</body>
</html>
