<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clientes — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">

  <style>
    /* ── Date picker oscuro ── */
    input[type="date"] {
      color-scheme: dark;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* ── Toggle RTN ── */
    .rtn-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .rtn-toggle-wrap label {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0;
      cursor: pointer;
    }

    /* Toggle switch custom */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 20px;
      border: 1px solid #333;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      background: #555;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(255,255,255,.1);
      border-color: #666;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translate(16px, -50%);
      background: #fff;
    }

    #rtn-wrap {
      transition: opacity 0.2s;
    }

    /* ── Notas con contador ── */
    .notas-wrap { position: relative; }
    .notas-counter {
      position: absolute;
      bottom: 0.4rem;
      right: 0.6rem;
      font-size: 0.65rem;
      color: #444;
      pointer-events: none;
    }
    .notas-wrap textarea { padding-bottom: 1.4rem !important; resize: none; }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Clientes</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar cliente…" aria-label="Search">
        <button class="btn" id="buscar-cliente" type="submit">Buscar</button>
      </form>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Nacimiento</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-clientes">
        <tr><td colspan="7" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>

    <!-- Formulario -->
    <form id="form-cliente" class="row g-3 mt-3">
      <input type="hidden" id="id" />

      <!-- Fila 1: nombre + teléfono + email -->
      <div class="col-md-4">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input id="nombre" class="form-control" placeholder="Nombre del cliente" required />
      </div>

      <div class="col-md-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input id="telefono" class="form-control" placeholder="+504 9999-0000" />
      </div>

      <div class="col-md-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" class="form-control" type="email" placeholder="correo@ejemplo.com" />
      </div>

      <div class="col-md-2">
        <label for="fecha_nacimiento" class="form-label">Fecha nacimiento</label>
        <input id="fecha_nacimiento" class="form-control" type="date" />
      </div>

      <!-- Fila 2: notas + RTN + estado -->
      <div class="col-md-5">
        <label for="notas" class="form-label">Notas</label>
        <div class="notas-wrap">
          <textarea
            id="notas"
            class="form-control"
            placeholder="Preferencias, alergias, observaciones…"
            rows="3"
            maxlength="250"
          ></textarea>
          <span class="notas-counter"><span id="nota-count">0</span>/250</span>
        </div>
      </div>

      <div class="col-md-3">
        <!-- RTN con toggle -->
        <div class="rtn-toggle-wrap">
          <label class="toggle-switch">
            <input type="checkbox" id="rtn-toggle">
            <span class="toggle-slider"></span>
          </label>
          <label for="rtn-toggle">RTN (opcional)</label>
        </div>
        <div id="rtn-wrap" style="opacity: 0.4;">
          <input
            id="rtn"
            class="form-control"
            placeholder="0000-0000-000000"
            disabled
          />
        </div>
      </div>

      <div class="col-md-2">
        <label for="activo" class="form-label">Estado</label>
        <select id="activo" class="form-select">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="col-12 col-md-auto d-flex align-items-end gap-2">
        <button type="submit" class="btn-form btn-form-save">Guardar cliente</button>
        <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Cancelar</button>
      </div>

    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/Barberos/clientes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
