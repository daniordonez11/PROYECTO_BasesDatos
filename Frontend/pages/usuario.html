<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Usuarios</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar usuario…" aria-label="Search">
        <button class="btn" id="buscar-usuario" type="submit">Buscar</button>
      </form>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-usuarios">
        <tr>
          <td colspan="7" class="text-center">Cargando...</td>
        </tr>
      </tbody>
    </table>

    <!-- Formulario -->
    <form id="form-usuario" class="row g-2 mt-3">
      <input type="hidden" id="id" />

      <!-- Username -->
      <div class="col-md-2">
        <label for="username" class="form-label">Username</label>
        <input id="username" class="form-control" placeholder="usuario123" required />
      </div>

      <!-- Nombre -->
      <div class="col-md-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input id="nombre" class="form-control" placeholder="Nombre" required />
      </div>

      <!-- Email -->
      <div class="col-md-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" class="form-control" type="email" placeholder="correo@ejemplo.com" />
      </div>

      <!-- Password -->
      <div class="col-md-3">
        <label for="password" class="form-label">Contraseña</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" />
      </div>

      <!-- Rol -->
      <div class="col-md-2">
        <label for="rol_id" class="form-label">Rol</label>
        <select id="rol_id" class="form-select">
          <option value="">-- Rol --</option>
        </select>
      </div>

      <!-- Estado -->
      <div class="col-md-2">
        <label for="is_activo" class="form-label">Estado</label>
        <select id="is_activo" class="form-select">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="col-12 col-md-auto d-flex align-items-end gap-2">
        <button type="submit" class="btn-form btn-form-save">Guardar</button>
        <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Cancelar</button>
      </div>

    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/GestionInterna/usuarios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
