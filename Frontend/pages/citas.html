<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Citas — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">

  <style>
    input[type="date"], input[type="time"] { color-scheme: dark; }

    .servicios-chips-wrap {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem;
    }

    .servicio-chip {
      display: flex; flex-direction: column; align-items: flex-start; gap: 0.1rem;
      font-family: 'Jost', sans-serif; padding: 0.4rem 0.8rem;
      border-radius: 3px; border: 1px solid #2e2e2e;
      background: #161616; color: #777; cursor: pointer; transition: all 0.2s ease;
    }
    .servicio-chip .chip-nombre { font-size: 0.78rem; font-weight: 500; }
    .servicio-chip .chip-precio { font-size: 0.65rem; color: #555; }
    .servicio-chip:hover { border-color: #555; color: #ccc; }
    .servicio-chip.active { border-color: #3a7d5a; background: rgba(58,125,90,.1); color: #7ecba0; }
    .servicio-chip.active .chip-precio { color: #5a9d7a; }

    .servicios-seleccionados-wrap {
      display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 36px;
      padding: 0.5rem; background: #111; border: 1px solid #222; border-radius: 3px;
    }

    .servicio-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(58,125,90,.15); border: 1px solid #3a7d5a;
      border-radius: 2px; padding: 0.25rem 0.6rem;
      font-family: 'Jost', sans-serif; font-size: 0.75rem; color: #7ecba0;
    }
    .servicio-tag-remove {
      background: none; border: none; color: #5a9d7a; cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0; transition: color 0.15s;
    }
    .servicio-tag-remove:hover { color: #e07070; }

    /* Totales */
    .totales-box {
      background: #111; border: 1px solid #222; border-radius: 3px; padding: 0.85rem 1rem;
    }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'Jost', sans-serif; font-size: 0.8rem;
      padding: 0.35rem 0; color: var(--text-muted);
      border-bottom: 1px solid #1e1e1e;
    }
    .total-row:last-child { border-bottom: none; }
    .total-row.total-final {
      font-size: 1rem; font-weight: 600; color: var(--white);
      margin-top: 0.25rem; padding-top: 0.5rem; border-top: 1px solid #333;
    }
    .total-input {
      width: 80px; background: #1a1a1a; border: 1px solid #2a2a2a;
      color: var(--text); font-family: 'Jost', sans-serif; font-size: 0.8rem;
      border-radius: 2px; padding: 0.2rem 0.4rem; text-align: right;
    }
    .total-prefix { color: #666; font-size: 0.8rem; }

    /* Cliente */
    .cliente-search-wrap { position: relative; }
    #cliente-resultados {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #161616; border: 1px solid #2a2a2a; border-radius: 3px;
      z-index: 100; display: none; max-height: 200px; overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }
    .cliente-result-item {
      display: flex; flex-direction: column; padding: 0.55rem 0.85rem;
      cursor: pointer; border-bottom: 1px solid #1e1e1e;
      transition: background 0.15s; font-family: 'Jost', sans-serif; font-size: 0.82rem;
    }
    .cliente-result-item:last-child { border-bottom: none; }
    .cliente-result-item:hover { background: rgba(255,255,255,.04); }
    .cliente-result-item.no-result { color: #555; cursor: default; font-size: 0.75rem; }

    #form-nuevo-cliente {
      background: #111; border: 1px solid #222; border-left: 2px solid #3a7d5a;
      border-radius: 3px; padding: 0.85rem; margin-top: 0.5rem;
    }
    #cliente-display {
      font-family: 'Jost', sans-serif; font-size: 0.78rem; min-height: 1.2rem; margin-top: 0.3rem;
    }

    /* Select impuesto dentro del totales-box */
    .impuesto-select {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #999;
      font-family: 'Jost', sans-serif; font-size: 0.75rem;
      border-radius: 2px; padding: 0.2rem 0.4rem; cursor: pointer;
      appearance: none; -webkit-appearance: none;
    }
    .impuesto-select:focus { outline: none; border-color: #555; }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestion de Citas</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar cita..." aria-label="Search">
        <button class="btn" id="buscar-cita" type="submit">Buscar</button>
      </form>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Cliente / Sucursal</th>
          <th>Barbero</th>
          <th>Servicios</th>
          <th>Fecha</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-citas">
        <tr><td colspan="8" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>

    <!-- Formulario nueva cita -->
    <form id="form-cita" class="row g-3 mt-3">

      <div class="col-12">
        <h6 style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--white);
          border-bottom:1px solid #222;padding-bottom:0.5rem;margin:0;">
          Nueva Cita
        </h6>
      </div>

      <!-- Barbero + Sucursal + Estado -->
      <div class="col-md-4">
        <label for="barbero_id" class="form-label">Barbero</label>
        <select id="barbero_id" class="form-select">
          <option value="">-- Seleccionar barbero --</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="sucursal_id" class="form-label">Sucursal</label>
        <select id="sucursal_id" class="form-select">
          <option value="">-- Seleccionar sucursal --</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="estado" class="form-label">Estado inicial</label>
        <select id="estado" class="form-select">
          <option value="PENDIENTE">Pendiente</option>
          <option value="CONFIRMADA">Confirmada</option>
          <option value="EN_SERVICIO">En servicio</option>
          <option value="COMPLETADA">Completada</option>
        </select>
      </div>

      <!-- Fecha y hora -->
      <div class="col-md-3">
        <label for="fecha_cita" class="form-label">Fecha</label>
        <input id="fecha_cita" class="form-control" type="date" required />
      </div>
      <div class="col-md-2">
        <label for="hora_inicio" class="form-label">Hora inicio</label>
        <input id="hora_inicio" class="form-control" type="time" required />
      </div>
      <div class="col-md-2">
        <label for="hora_fin" class="form-label">Hora fin</label>
        <input id="hora_fin" class="form-control" type="time" />
      </div>

      <!-- Cliente -->
      <div class="col-md-5">
        <label class="form-label">Cliente</label>
        <input type="hidden" id="cliente_id" />
        <div class="cliente-search-wrap">
          <input id="cliente-search" class="form-control"
            placeholder="Buscar cliente por nombre..." autocomplete="off" />
          <div id="cliente-resultados"></div>
        </div>
        <div id="cliente-display"></div>
        <button type="button" id="btn-nuevo-cliente" style="
          margin-top:0.5rem; font-family:'Jost',sans-serif; font-size:0.72rem;
          font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
          background:transparent; border:1px solid #2a2a2a; color:#555;
          border-radius:3px; padding:0.3rem 0.75rem; cursor:pointer; transition:all 0.2s;">
          + Crear cliente nuevo
        </button>
        <div id="form-nuevo-cliente" style="display:none;">
          <div class="row g-2 mt-1">
            <div class="col-7">
              <label class="form-label">Nombre</label>
              <input id="nuevo-nombre" class="form-control" placeholder="Nombre del cliente" />
            </div>
            <div class="col-5">
              <label class="form-label">Telefono</label>
              <input id="nuevo-telefono" class="form-control" placeholder="+504..." />
            </div>
          </div>
        </div>
      </div>

      <!-- Servicios -->
      <div class="col-12">
        <label class="form-label">Servicios disponibles</label>
        <div class="servicios-chips-wrap" id="servicios-disponibles"></div>
        <label class="form-label">Servicios seleccionados</label>
        <div class="servicios-seleccionados-wrap" id="servicios-seleccionados">
          <span style="font-size:0.75rem;color:#555;">Ningun servicio seleccionado</span>
        </div>
      </div>

      <!-- Totales -->
      <div class="col-md-5">
        <div class="totales-box">

          <!-- Subtotal -->
          <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotal-display">L. 0.00</span>
          </div>

          <!-- Impuesto -->
          <div class="total-row">
            <span>Impuesto</span>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <select id="impuesto_id" class="impuesto-select">
                <option value="" data-tasa="0">Sin impuesto</option>
              </select>
              <span id="impuesto-display" style="color:var(--text-dim);min-width:60px;text-align:right;">L. 0.00</span>
            </div>
          </div>

          <!-- Descuento -->
          <div class="total-row">
            <span>Descuento</span>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <span class="total-prefix">L.</span>
              <input id="descuento_monto" type="number" min="0" step="0.01" value="0" class="total-input" />
            </div>
          </div>

          <!-- Propina -->
          <div class="total-row">
            <span>Propina</span>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <span class="total-prefix">L.</span>
              <input id="propina_monto" type="number" min="0" step="0.01" value="0" class="total-input" />
            </div>
          </div>

          <!-- Total final -->
          <div class="total-row total-final">
            <span>Total</span>
            <span id="total-display">L. 0.00</span>
          </div>

        </div>

        <!-- Inputs hidden -->
        <input type="hidden" id="subtotal-hidden" value="0" />
        <input type="hidden" id="impuesto-monto-hidden" value="0" />
        <input type="hidden" id="total-hidden" value="0" />
      </div>

      <!-- Metodo de pago + notas -->
      <div class="col-md-7">
        <div class="row g-2">
          <div class="col-12">
            <label for="metodo_pago_id" class="form-label">Metodo de pago</label>
            <select id="metodo_pago_id" class="form-select">
              <option value="">-- Sin pago aun --</option>
            </select>
          </div>
          <div class="col-12">
            <label for="notas" class="form-label">Notas</label>
            <textarea id="notas" class="form-control" rows="3"
              placeholder="Observaciones de la cita..."></textarea>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn-form btn-form-save">Crear cita</button>
        <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Limpiar</button>
      </div>

    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/Barberos/citas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
