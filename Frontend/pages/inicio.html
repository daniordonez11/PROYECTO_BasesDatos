<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">

  <style>
    /* ── Tarjetas de resumen ── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 3px;
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.green::before  { background: linear-gradient(90deg, #3a7d5a, transparent); }
    .stat-card.blue::before   { background: linear-gradient(90deg, #4a90d9, transparent); }
    .stat-card.purple::before { background: linear-gradient(90deg, #9650d9, transparent); }

    .stat-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-sub {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      color: #555;
      margin-top: 0.4rem;
    }

    /* ── Sección de tablas ── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    .dash-section {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 3px;
      overflow: hidden;
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .dash-section-header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .dash-section-title {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
      margin: 0;
    }

    .dash-section .table {
      margin: 0;
      animation: none;
    }

    .dash-section .table thead th {
      background: #111 !important;
      padding: 0.6rem 1rem;
      font-size: 0.65rem;
    }

    .dash-section .table tbody tr td {
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Fecha de hoy */
    .fecha-hoy {
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Título -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h1>Dashboard</h1>
    </div>
    <p class="fecha-hoy" id="fecha-hoy"></p>

    <!-- Error -->
    <div id="dashboard-error" style="display:none;color:#e07070;font-family:'Jost',sans-serif;
      font-size:0.82rem;margin-bottom:1rem;"></div>

    <!-- Tarjetas de resumen -->
    <div class="stat-cards">

      <div class="stat-card green">
        <div class="stat-label">Ingresos del día</div>
        <div class="stat-value" id="ingresos-hoy">L. —</div>
        <div class="stat-sub">Citas completadas hoy</div>
      </div>

      <div class="stat-card blue">
        <div class="stat-label">Citas hoy</div>
        <div class="stat-value" id="total-citas">—</div>
        <div class="stat-sub">Total programadas</div>
      </div>

      <div class="stat-card purple">
        <div class="stat-label">Completadas hoy</div>
        <div class="stat-value" id="citas-completadas">—</div>
        <div class="stat-sub">Servicios finalizados</div>
      </div>

    </div>

    <!-- Tablas -->
    <div class="dashboard-grid">

      <!-- Servicios más solicitados -->
      <div class="dash-section">
        <div class="dash-section-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
          <span class="dash-section-title">Servicios más solicitados</span>
        </div>
        <table class="table table-hover align-middle">
          <thead class="table-secondary">
            <tr>
              <th>Servicio</th>
              <th>Precio</th>
              <th>Solicitudes</th>
            </tr>
          </thead>
          <tbody id="tbody-servicios-pop">
            <tr><td colspan="3" class="text-center">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Inventario bajo stock -->
      <div class="dash-section">
        <div class="dash-section-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="#cc3f3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span class="dash-section-title">Inventario bajo stock</span>
        </div>
        <table class="table table-hover align-middle">
          <thead class="table-secondary">
            <tr>
              <th>Producto</th>
              <th>Sucursal</th>
              <th>Stock actual</th>
              <th>Stock mínimo</th>
            </tr>
          </thead>
          <tbody id="tbody-inventario-bajo">
            <tr><td colspan="4" class="text-center">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/inicio.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Mostrar fecha de hoy
    document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-HN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  </script>
</body>
</html>
