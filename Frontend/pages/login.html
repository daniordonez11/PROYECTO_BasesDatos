<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingreso — Paris Barber Shop</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Login CSS -->
  <link href="../css/login.css" rel="stylesheet">
</head>
<body>

  <div class="login-wrapper">

    <!-- ── Panel izquierdo: branding ── -->
    <div class="login-brand">
      <div class="login-logo">
        <img src="../assets/img/PARIS.png" alt="Paris Barber Shop">
      </div>
      <div class="login-tagline">
        <span></span>
      </div>
    </div>

    <!-- ── Panel derecho: formulario ── -->
    <div class="login-form-panel">
      <div class="login-card">

        <!-- Encabezado -->
        <div class="login-card-header">
          <h1>Bienvenido</h1>
          <p>Ingresa tus credenciales para continuar</p>
          <div class="login-separator"></div>
        </div>

        <!-- Formulario -->
        <form id="login-form">

          <!-- Usuario -->
          <label for="username" class="login-label">Usuario</label>
          <div class="login-input-wrap">
            <!-- Ícono usuario -->
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              class="login-input"
              id="username"
              placeholder="Tu nombre de usuario"
              required
              autocomplete="username"
            >
          </div>

          <!-- Contraseña -->
          <label for="password" class="login-label">Contraseña</label>
          <div class="login-input-wrap">
            <!-- Ícono candado -->
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              class="login-input"
              id="password"
              placeholder="Tu contraseña"
              required
              autocomplete="current-password"
            >
          </div>

          <!-- Submit -->
          <button type="submit" class="login-btn">Iniciar Sesión</button>

        </form>

        <!-- Alertas -->
        <div id="alert-container"></div>

        <!-- Footer -->
        <div class="login-footer">
          <p>Paris Barber Shop &copy;</p>
        </div>

      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Tu script de login -->
  <!-- <script type="module" src="../js/login.js"></script> -->
  <script src="../js/login.js"></script>
</body>
</html>
