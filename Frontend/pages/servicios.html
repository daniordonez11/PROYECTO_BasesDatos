<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Servicios — Paris Barber Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/table-form.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/navbar.css">

  <style>
    /* ── Chips de nombres sugeridos ── */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
    }

    .nombre-chip {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 0.28rem 0.75rem;
      border-radius: 20px;
      border: 1px solid #2e2e2e;
      background: #161616;
      color: #666;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .nombre-chip:hover {
      border-color: #555;
      color: #ccc;
      background: #1c1c1c;
    }

    .nombre-chip.active {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,.08);
    }

    /* ── Select de duración como botones ── */
    .duracion-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
    }

    .duracion-btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.42rem 0.5rem;
      border-radius: 3px;
      border: 1px solid #2e2e2e;
      background: #161616;
      color: #666;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .duracion-btn:hover {
      border-color: #555;
      color: #ccc;
    }

    .duracion-btn.active {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,.08);
    }

    /* ── Input precio con prefijo ── */
    .precio-wrap {
      position: relative;
    }

    .precio-wrap .precio-prefix {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      color: #666;
      pointer-events: none;
    }

    .precio-wrap input {
      padding-left: 2rem !important;
    }

    /* ── Descripción con contador ── */
    .desc-wrap { position: relative; }
    .desc-counter {
      position: absolute;
      bottom: 0.4rem;
      right: 0.6rem;
      font-size: 0.65rem;
      color: #444;
      pointer-events: none;
    }
    .desc-wrap textarea { padding-bottom: 1.4rem !important; resize: none; }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="c">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Servicios</h1>
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar servicio…" aria-label="Search">
        <button class="btn" id="buscar-servicio" type="submit">Buscar</button>
      </form>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-secondary">
        <tr>
          <th>ID</th>
          <th>Servicio</th>
          <th>Duración</th>
          <th>Precio</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-servicios">
        <tr><td colspan="6" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>

    <!-- Formulario -->
    <form id="form-servicio" class="row g-3 mt-3">
      <input type="hidden" id="id" />

      <!-- Columna izquierda: nombre + descripción -->
      <div class="col-md-5">

        <!-- Chips de nombres sugeridos -->
        <label class="form-label">Nombre del servicio</label>
        <div class="chips-wrap">
          <button type="button" class="nombre-chip" data-value="Corte de cabello">Corte de cabello</button>
          <button type="button" class="nombre-chip" data-value="Afeitado clásico">Afeitado clásico</button>
          <button type="button" class="nombre-chip" data-value="Corte y barba">Corte y barba</button>
          <button type="button" class="nombre-chip" data-value="Arreglo de barba">Arreglo de barba</button>
          <button type="button" class="nombre-chip" data-value="Tratamiento capilar">Tratamiento capilar</button>
          <button type="button" class="nombre-chip" data-value="Tinte">Tinte</button>
          <button type="button" class="nombre-chip" data-value="Diseño de cejas">Diseño de cejas</button>
          <button type="button" class="nombre-chip" data-value="Servicio completo">Servicio completo</button>
        </div>
        <input id="nombre" class="form-control" placeholder="O escribe un nombre personalizado…" required />

        <!-- Descripción -->
        <label class="form-label mt-3">Descripción</label>
        <div class="desc-wrap">
          <textarea
            id="descripcion"
            class="form-control"
            placeholder="Descripción del servicio…"
            rows="3"
            maxlength="250"
          ></textarea>
          <span class="desc-counter"><span id="desc-count">0</span>/250</span>
        </div>

      </div>

      <!-- Columna derecha: duración + precio + estado -->
      <div class="col-md-7">

        <!-- Duración como botones -->
        <label class="form-label">Duración aproximada</label>
        <div class="duracion-grid" id="duracion-grid">
          <button type="button" class="duracion-btn" data-value="15">15 min</button>
          <button type="button" class="duracion-btn" data-value="20">20 min</button>
          <button type="button" class="duracion-btn active" data-value="30">30 min</button>
          <button type="button" class="duracion-btn" data-value="45">45 min</button>
          <button type="button" class="duracion-btn" data-value="60">1 hora</button>
          <button type="button" class="duracion-btn" data-value="75">1h 15min</button>
          <button type="button" class="duracion-btn" data-value="90">1h 30min</button>
          <button type="button" class="duracion-btn" data-value="120">2 horas</button>
        </div>
        <!-- Input oculto para el valor real -->
        <input type="hidden" id="duracion_aprox" value="30" />

        <!-- Precio y Estado en la misma fila -->
        <div class="row g-2 mt-2">
          <div class="col-7">
            <label for="precio_base" class="form-label">Precio base</label>
            <div class="precio-wrap">
              <span class="precio-prefix">L.</span>
              <input
                id="precio_base"
                class="form-control"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
          </div>
          <div class="col-5">
            <label for="estado" class="form-label">Estado</label>
            <select id="estado" class="form-select">
              <option value="1">Activo</option>
              <option value="0">Inactivo</option>
            </select>
          </div>
        </div>

        <!-- Botones -->
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn-form btn-form-save">Guardar servicio</button>
          <button type="button" id="btn-cancelar" class="btn-form btn-form-cancel">Cancelar</button>
        </div>

      </div>
    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="/js/components/navbar_loader.js"></script>
  <script type="module" src="/js/Barberos/servicios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ── Botones de duración ──────────────────────
    document.querySelectorAll('.duracion-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.duracion-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('duracion_aprox').value = btn.getAttribute('data-value');
      });
    });

    // ── Contador de descripción ──────────────────
    document.getElementById('descripcion')?.addEventListener('input', function () {
      document.getElementById('desc-count').textContent = this.value.length;
    });
  </script>

</body>
</html>
